name: Mirror to GitLab
on:
  push:
    branches: ["**"]
  delete: {}

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push mirror to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/hubert.williams/${{ github.event.repository.name }}.git
          git push --mirror gitlab
